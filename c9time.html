<link rel="stylesheet" href="c9time.css">

<html>
    <div class="topnav">
        <ul name="navbar">
            <li name="navbar_item"><a href="index.html">back to mimosa.gay</a></li>
        </ul>
    </div>

    <body onload="timer()">
        On Earth it is:
        <br>
        <h1 id="etime"></h1>

        At <u>Outpost 3, Copper 9</u> it is:
        <br>
        <h1 id="c9time"></h1>
        <button id="copyautotime">Copy to clipboard</button>
        <hr>
        <br>
        Convert any time:
        <br><br>
        <input type="datetime-local" id="inputtime" style="font-size: x-large;">
        <h1 id="outputtime"></h1>
        <button id="copyoutputtime">Copy to clipboard</button>
    </body>

    <script>
        const autoTimeButton = document.getElementById("copyautotime");
        const outputTimeButton = document.getElementById("copyoutputtime");

        let knownDateEarth = new Date("1:16 March 2, 2026").getTime();

        let c9DayLength = 3600000 * (24 + 35/60);
        let c9YearDays = 392.330254673;
        let c9YearLength =  c9YearDays * c9DayLength ; // in ms

        let mult =          365.256363004 / c9YearLength;

        let months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Ser"];
        let monthLengths = [31,28,31,30,31,30,31,31,30,31,30,31,27];

        function timer() {
            let curTime = new Date(); // "9:22:02 February 16 2025", "9:07:48 November 6 2024"
            let now = curTime.getTime();

            let nowArray = [curTime.getFullYear(),curTime.getMonth() + 1,curTime.getDate(),curTime.getHours(),curTime.getMinutes(),curTime.getSeconds(),curTime.getMilliseconds()];

            //nowArray = [2025,1,16,9,22,2,0];

            document.getElementById("etime").innerHTML = timeArrayToString(nowArray);
            let c9Time = msToC9(msFromEarthEpoch(now));
            document.getElementById("c9time").innerHTML = timeArrayToString(c9Time);

            let inputdate = document.querySelector('input[type="datetime-local"]');
            let outputdate = msToC9(msFromEarthEpoch(inputdate.valueAsNumber));
            document.getElementById("outputtime").innerHTML = timeArrayToString(outputdate);

            setTimeout(timer,100);
        }    

        autoTimeButton.addEventListener("click",copyAutoTime);

        function copyAutoTime() {
            navigator.clipboard.writeText(document.getElementById("c9time").innerText);
        }

        outputTimeButton.addEventListener("click",copyOutputTime);

        function copyOutputTime() {
            navigator.clipboard.writeText(document.getElementById("outputtime").innerText);
        }

        function msFromEarthEpoch(time) {
            return time - knownDateEarth;
        }

        function msToC9(time) {
            let c9Epoch = [3073,3,6,10,0,0,0]

            let c9HLength = c9DayLength / 24;
            let c9MLength = c9HLength / 60;
            let c9SLength = c9MLength / 60;
            let c9MSLength = c9SLength / 1000;

            let outArray = [0,0,0,0,0,0,0] // Y M D H m s ms

            let yearOffset = (c9Epoch[1]-1) * 31 * c9DayLength + (c9Epoch[2]-1) * c9DayLength + c9Epoch[3]*c9HLength

            let years = Math.floor((time + yearOffset) / c9YearLength) + c9Epoch[0];
            outArray[0] = years;
            time -= Math.floor((time + yearOffset) / c9YearLength) * c9YearLength;

            let totalDays = (yearOffset + time) - 2 * c9DayLength;

            let month = 0;
            let day = 0;

            for (let j = 1; j <=13; j++) {
                let toSub = 0;

                //console.log(j);

                toSub = monthLengths[j-1];
                if (j == 2) {
                    if (years % 3 == 0) toSub += 1;
                }

                toSub *= c9DayLength;

                month += 1;

                if (totalDays - toSub > 0) {
                    //console.log(months[j-1]);
                    totalDays -= toSub;
                } else {
                    break;
                }
            }

            outArray[1] = month;
            outArray[2] = Math.floor(totalDays / c9DayLength);
            time = totalDays - outArray[2] * c9DayLength;

            let hours = Math.floor(time / c9HLength);
            outArray[3] = hours;
            time -= hours * c9HLength;

            let minutes = Math.floor(time / c9MLength);
            outArray[4] = minutes;
            time -= minutes * c9MLength;

            let seconds = Math.floor(time / c9SLength);
            outArray[5] = seconds;
            time -= seconds * c9SLength;

            let mseconds = Math.floor(time / c9MSLength);
            outArray[6] = mseconds;

            return outArray;
        }
        
        function timeArrayToString(time) {
            return time[3] + ":" + (time[4] < 10 ? "0" + time[4] : time[4]) + ":" + (time[5] < 10 ? "0" + time[5] : time[5])+ " - " + (months[time[1] - 1]) + " " + time[2] + ", " + time[0];
        } 

    </script>

</html>
